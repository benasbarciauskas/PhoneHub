<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PhoneHub social preview">
  <title>PhoneHub — Mirror and automate your iPhones and Android phones from one Mac</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0E1A"/>
      <stop offset="1" stop-color="#0C1422"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5B8CFF"/>
      <stop offset="1" stop-color="#3DD0E0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5B8CFF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#5B8CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1000" cy="180" r="430" fill="url(#glow)"/>

  <!-- baseline rule (well clear of the meta line at y=560) -->
  <line x1="96" y1="430" x2="1184" y2="430" stroke="#1B2740" stroke-width="1" opacity="0.6"/>

  <!-- mark -->
  <g transform="translate(96,150)">
    <rect x="0" y="0" width="160" height="160" rx="38" fill="url(#tile)"/>
    <g transform="translate(0,0) scale(1.6667)">
      <g fill="none" stroke="#0A1226" stroke-linejoin="round">
        <rect x="30" y="20" width="26" height="46" rx="6" fill="#0A1226" opacity="0.22" stroke="none"/>
        <rect x="30" y="20" width="26" height="46" rx="6" stroke-width="3" opacity="0.55"/>
        <rect x="44" y="32" width="26" height="46" rx="6" fill="#0A1226"/>
        <rect x="44" y="32" width="26" height="46" rx="6" stroke-width="3"/>
        <line x1="51" y1="40" x2="63" y2="40" stroke="#3DD0E0" stroke-width="3" stroke-linecap="round"/>
        <circle cx="57" cy="71" r="1.8" fill="#5B8CFF" stroke="none"/>
      </g>
      <circle cx="29" cy="74" r="5" fill="#0A1226"/>
      <circle cx="29" cy="74" r="2" fill="#3DD0E0"/>
    </g>
  </g>

  <!-- title -->
  <text x="300" y="222" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="78" font-weight="700" letter-spacing="-1" fill="#EAF0FF">Phone<tspan fill="#3DD0E0">Hub</tspan></text>

  <!-- tagline (wrapped on two lines, generous bounds, ends well left of x=1184) -->
  <text x="300" y="282" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="33" font-weight="500" fill="#9FB0D0">Mirror and automate your iPhones and Android</text>
  <text x="300" y="326" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="33" font-weight="500" fill="#9FB0D0">phones from one Mac.</text>

  <!-- meta line: bottom-left, short so it ends well clear of the pill at x=1012 -->
  <text x="96" y="568" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="24" fill="#5E708F">iPhone&#160;Mirroring&#160;&#160;&#183;&#160;&#160;scrcpy&#160;&#160;&#183;&#160;&#160;AI&#160;presets</text>

  <!-- macOS pill: bottom-right, clearly separated from the meta line -->
  <g transform="translate(1012,540)">
    <rect x="0" y="0" width="172" height="44" rx="22" fill="none" stroke="#5B8CFF" stroke-opacity="0.5"/>
    <text x="86" y="29" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="20" font-weight="600" fill="#5B8CFF">macOS&#160;app</text>
  </g>
</svg>
